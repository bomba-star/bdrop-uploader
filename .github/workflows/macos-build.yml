name: macOS Build (App-Artifact)

# Baut die App auf einem gehosteten macOS-Runner (Debug, unsigniert), buendelt
# best-effort statisches ffmpeg und laedt die fertige .app als Artifact hoch.
# Signing/Notarisierung bewusst AUS. Die .app ist mit lokal installiertem ffmpeg
# (Homebrew) sofort lauffaehig; nach dem Download ggf. Gatekeeper-Quarantaene
# entfernen: xattr -dr com.apple.quarantine BDropUploader.app
# Manuell ausloesbar (workflow_dispatch) und bei Push auf macos-app/**.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'macos-app/**'
      - '.github/workflows/macos-build.yml'

jobs:
  build:
    name: Compile (Debug, unsigniert)
    runs-on: macos-15
    timeout-minutes: 30
    defaults:
      run:
        working-directory: macos-app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Toolchain-Versionen
        run: |
          sw_vers
          xcodebuild -version
          swift --version

      - name: XcodeGen + xcbeautify installieren
        run: brew install xcodegen xcbeautify

      - name: ffmpeg statisch buendeln (best effort)
        continue-on-error: true
        run: |
          # Statische arm64-Builds ins Bundle legen, damit die App ohne Homebrew
          # umwandelt. Best effort: schlaegt der Download fehl, baut die App
          # trotzdem (FFmpegLocator faellt zur Laufzeit auf Homebrew zurueck).
          set -e
          mkdir -p Resources/ffmpeg
          base="https://ffmpeg.martin-riedl.de/redirect/latest/macos/arm64/release"
          curl -fsSL "$base/ffmpeg.zip"  -o /tmp/ffmpeg.zip
          curl -fsSL "$base/ffprobe.zip" -o /tmp/ffprobe.zip
          unzip -o /tmp/ffmpeg.zip  -d Resources/ffmpeg
          unzip -o /tmp/ffprobe.zip -d Resources/ffmpeg
          chmod +x Resources/ffmpeg/ffmpeg Resources/ffmpeg/ffprobe
          Resources/ffmpeg/ffmpeg -version | head -1
          ls -la Resources/ffmpeg

      - name: ffmpeg-Resource-Ordner sicherstellen
        run: mkdir -p Resources/ffmpeg && ls -la Resources/ffmpeg

      - name: Xcode-Projekt aus project.yml generieren
        run: xcodegen generate

      - name: Build (Debug, ohne Code-Signing)
        run: |
          set -o pipefail
          xcodebuild \
            -project BDropUploader.xcodeproj \
            -target BDropUploader \
            -configuration Debug \
            -destination 'generic/platform=macOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            ENABLE_HARDENED_RUNTIME=NO \
            SYMROOT="$RUNNER_TEMP/build" \
            build 2>&1 | tee "$RUNNER_TEMP/xcodebuild.log" | xcbeautify

      - name: Compiler-Fehler zusammenfassen
        if: always()
        run: |
          echo "=== error:-Zeilen (max 100) ==="
          grep -nE "error:" "$RUNNER_TEMP/xcodebuild.log" | head -100 || echo "keine error:-Zeilen gefunden"
          echo ""
          echo "=== warning:-Anzahl ==="
          grep -cE "warning:" "$RUNNER_TEMP/xcodebuild.log" || true

      - name: Build-Log als Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xcodebuild-log
          path: ${{ runner.temp }}/xcodebuild.log
          if-no-files-found: warn

      - name: App packen (unsigniert)
        if: success()
        run: |
          APP="$RUNNER_TEMP/build/Debug/BDropUploader.app"
          if [ -d "$APP" ]; then
            # ffmpeg/ffprobe zuverlaessig ins Bundle legen (XcodeGen-Resource-Copy
            # greift bei den Binaries nicht). FFmpegLocator sucht hier zuerst.
            if [ -x Resources/ffmpeg/ffmpeg ]; then
              mkdir -p "$APP/Contents/Resources/ffmpeg"
              cp Resources/ffmpeg/ffmpeg Resources/ffmpeg/ffprobe "$APP/Contents/Resources/ffmpeg/" 2>/dev/null || true
              chmod +x "$APP/Contents/Resources/ffmpeg/ffmpeg" "$APP/Contents/Resources/ffmpeg/ffprobe" 2>/dev/null || true
              echo "ffmpeg/ffprobe ins Bundle kopiert."
            fi
            ditto -c -k --sequesterRsrc --keepParent "$APP" "$RUNNER_TEMP/BDropUploader.app.zip"
            echo "App gepackt: $APP"
          else
            echo "App nicht gefunden unter $APP"
            ls -R "$RUNNER_TEMP/build" || true
            exit 1
          fi

      - name: App-Artifact hochladen (unsigniert, lauffaehig mit lokalem ffmpeg)
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: BDropUploader-app
          path: ${{ runner.temp }}/BDropUploader.app.zip
          if-no-files-found: warn
